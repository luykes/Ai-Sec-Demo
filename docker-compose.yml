services:

  # ── nginx: serves React app + reverse proxies /api + terminates SSL ──────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot-etc:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── certbot: auto-renews Let's Encrypt cert every 12 hours ──────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot-etc:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ── app: Express API + MCP servers (raw 8787 + safe 8788) + Python agent ────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ALLOWED_ORIGIN=https://${DOMAIN}
    env_file:
      - .env
    volumes:
      # Persist the runtime config (PS API key, username) across restarts
      - ./backend/.runtime-config.json:/app/backend/.runtime-config.json
    depends_on:
      - ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ollama: LLM service ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  ollama-data:
