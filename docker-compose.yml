services:

  # ── nginx: serves React app + reverse proxies /api + terminates SSL ──────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot-etc:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── certbot: auto-renews Let's Encrypt cert every 12 hours ──────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot-etc:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ── app: Express API + MCP servers (raw 8787 + safe 8788) + Python agent ────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      - PORT=3001
      - OLLAMA_HOST=http://ollama:11434
      - ALLOWED_ORIGIN=https://${DOMAIN}
      - COPILOT_URL=http://copilot-agent:8000
      - REDTEAM_API_KEY=${REDTEAM_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    env_file:
      - .env
    volumes:
      # Persist the runtime config (PS API key, username) across restarts
      - ./backend/.runtime-config.json:/app/backend/.runtime-config.json
    depends_on:
      - ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ollama: LLM service ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ── AI Operations Copilot — Python backend services ─────────────────────────
  copilot-mcp-devops:
    build:
      context: ./copilot
      dockerfile: Dockerfile
    command: uvicorn mcp_devops.main:app --host 0.0.0.0 --port 8002
    environment:
      - FIXTURES_DIR=/app/fixtures/devops
    volumes:
      - ./copilot/fixtures:/app/fixtures:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  copilot-mcp-soc:
    build:
      context: ./copilot
      dockerfile: Dockerfile
    command: uvicorn mcp_soc.main:app --host 0.0.0.0 --port 8003
    environment:
      - FIXTURES_DIR=/app/fixtures/soc
    volumes:
      - ./copilot/fixtures:/app/fixtures:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  copilot-mcp-external:
    build:
      context: ./copilot
      dockerfile: Dockerfile
    command: uvicorn mcp_external_malicious.main:app --host 0.0.0.0 --port 8004
    environment:
      - FIXTURES_DIR=/app/fixtures/docs
    volumes:
      - ./copilot/fixtures:/app/fixtures:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  copilot-gateway:
    build:
      context: ./copilot
      dockerfile: Dockerfile
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8001
    environment:
      - PROMPT_SECURITY_API_URL=${PROMPT_SECURITY_API_URL:-}
      - PROMPT_SECURITY_API_KEY=${PROMPT_SECURITY_API_KEY:-}
      - AUDIT_LOG_PATH=/app/data/audit.jsonl
    volumes:
      - copilot-data:/app/data
    depends_on:
      - copilot-mcp-devops
      - copilot-mcp-soc
      - copilot-mcp-external
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  copilot-agent:
    build:
      context: ./copilot
      dockerfile: Dockerfile
    command: uvicorn agent.main:app --host 0.0.0.0 --port 8000
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GATEWAY_URL=http://copilot-gateway:8001
      - MCP_DEVOPS_URL=http://copilot-mcp-devops:8002
      - MCP_SOC_URL=http://copilot-mcp-soc:8003
      - MCP_EXTERNAL_URL=http://copilot-mcp-external:8004
      - AUDIT_LOG_PATH=/app/data/audit.jsonl
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - copilot-data:/app/data
    depends_on:
      - copilot-gateway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  ollama-data:
  copilot-data:
